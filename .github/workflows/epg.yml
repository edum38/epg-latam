name: EPG Latinoamérica

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Crear EPG completo
        run: |
          cat > epg_latam.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <!-- ARGENTINA -->
  <channel id="Telefe"><display-name>Telefe</display-name></channel>
  <channel id="ElTrece"><display-name>El Trece</display-name></channel>
  <channel id="AmericaTV"><display-name>América TV</display-name></channel>
  <channel id="TVPublica"><display-name>TV Pública</display-name></channel>
  <channel id="TN"><display-name>Todo Noticias</display-name></channel>
  <channel id="TyC"><display-name>TyC Sports</display-name></channel>
  
  <!-- MÉXICO -->
  <channel id="LasEstrellas"><display-name>Las Estrellas</display-name></channel>
  <channel id="Azteca7"><display-name>Azteca 7</display-name></channel>
  <channel id="Canal5"><display-name>Canal 5</display-name></channel>
  <channel id="ImagenTV"><display-name>Imagen TV</display-name></channel>
  
  <!-- COLOMBIA -->
  <channel id="Caracol"><display-name>Caracol TV</display-name></channel>
  <channel id="RCN"><display-name>RCN</display-name></channel>
  <channel id="WinSports"><display-name>Win Sports</display-name></channel>
  
  <!-- PERÚ -->
  <channel id="AmericaTVPeru"><display-name>América Televisión</display-name></channel>
  <channel id="Latina"><display-name>Latina</display-name></channel>
  <channel id="ATV"><display-name>ATV</display-name></channel>
  <channel id="TVPeru"><display-name>TV Perú</display-name></channel>
  <channel id="RPP"><display-name>RPP TV</display-name></channel>
</tv>
EOF
          echo "✅ EPG creado con $(grep -c '<channel' epg_latam.xml) canales"
      
      - name: Comprimir EPG
        run: gzip -9 -c epg_latam.xml > epg_latam.xml.gz
      
      - name: Subir cambios
        run: |
          git add epg_latam.xml epg_latam.xml.gz
          git commit -m "EPG actualizado $(date +'%Y-%m-%d')" || exit 0
          git push
