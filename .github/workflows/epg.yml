name: EPG

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Crear EPG
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > epg_latam.xml
          echo '<tv>' >> epg_latam.xml
          echo '  <channel id="Telefe"><display-name>Telefe</display-name></channel>' >> epg_latam.xml
          echo '  <channel id="ElTrece"><display-name>El Trece</display-name></channel>' >> epg_latam.xml
          echo '</tv>' >> epg_latam.xml
      
      - name: Commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add epg_latam.xml
          git commit -m "EPG" || true
          git push
