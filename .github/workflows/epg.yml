name: EPG Latinoamérica

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
      
      - name: Configurar git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
      
      - name: Crear EPG
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > epg_latam.xml
          echo '<tv>' >> epg_latam.xml
          echo '  <channel id="Telefe"><display-name>Telefe</display-name></channel>' >> epg_latam.xml
          echo '  <channel id="ElTrece"><display-name>El Trece</display-name></channel>' >> epg_latam.xml
          echo '  <channel id="AmericaTV"><display-name>América TV</display-name></channel>' >> epg_latam.xml
          echo '  <channel id="LasEstrellas"><display-name>Las Estrellas</display-name></channel>' >> epg_latam.xml
          echo '  <channel id="Caracol"><display-name>Caracol TV</display-name></channel>' >> epg_latam.xml
          echo '  <channel id="RCN"><display-name>RCN</display-name></channel>' >> epg_latam.xml
          echo '  <channel id="Latina"><display-name>Latina</display-name></channel>' >> epg_latam.xml
          echo '</tv>' >> epg_latam.xml
          
          echo "✅ EPG creado"
          cat epg_latam.xml
      
      - name: Subir archivo
        run: |
          git add epg_latam.xml
          git commit -m "EPG actualizado $(date +'%Y-%m-%d')" || echo "No hay cambios"
          git push
