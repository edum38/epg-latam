name: EPG Latinoamérica

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Crear EPG completo
        run: |
          cat > epg_latam.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<tv>
  <!-- ARGENTINA -->
  <channel id="Telefe"><display-name>Telefe</display-name></channel>
  <channel id="ElTrece"><display-name>El Trece</display-name></channel>
  <channel id="AmericaTV"><display-name>América TV</display-name></channel>
  <channel id="TVPublica"><display-name>TV Pública</display-name></channel>
  <channel id="TN"><display-name>Todo Noticias</display-name></channel>
  <channel id="C5N"><display-name>C5N</display-name></channel>
  <channel id="Cronica"><display-name>Crónica TV</display-name></channel>
  <channel id="TyC"><display-name>TyC Sports</display-name></channel>
  
  <!-- MÉXICO -->
  <channel id="LasEstrellas"><display-name>Las Estrellas</display-name></channel>
  <channel id="Azteca7"><display-name>Azteca 7</display-name></channel>
  <channel id="AztecaTrece"><display-name>Azteca Trece</display-name></channel>
  <channel id="Canal5"><display-name>Canal 5</display-name></channel>
  <channel id="ImagenTV"><display-name>Imagen TV</display-name></channel>
  <channel id="TUDN"><display-name>TUDN</display-name></channel>
  
  <!-- COLOMBIA -->
  <channel id="Caracol"><display-name>Caracol TV</display-name></channel>
  <channel id="RCN"><display-name>RCN</display-name></channel>
  <channel id="SenalColombia"><display-name>Señal Colombia</display-name></channel>
  <channel id="WinSports"><display-name>Win Sports</display-name></channel>
  
  <!-- PERÚ -->
  <channel id="AmericaTVPeru"><display-name>América Televisión</display-name></channel>
  <channel id="Latina"><display-name>Latina</display-name></channel>
  <channel id="Panamericana"><display-name>Panamericana</display-name></channel>
  <channel id="ATV"><display-name>ATV</display-name></channel>
  <channel id="TVPeru"><display-name>TV Perú</display-name></channel>
  <channel id="Willax"><display-name>Willax TV</display-name></channel>
  <channel id="RPP"><display-name>RPP TV</display-name></channel>
  <channel id="CanalN"><display-name>Canal N</display-name></channel>
  
  <!-- PERÚ REGIONES -->
  <channel id="UniversalTV"><display-name>Universal TV Arequipa</display-name></channel>
  <channel id="CuscoTV"><display-name>Cusco TV</display-name></channel>
  <channel id="TrujilloTV"><display-name>Trujillo TV</display-name></channel>
  <channel id="ChiclayoTV"><display-name>Chiclayo TV</display-name></channel>
  <channel id="PiuraTV"><display-name>Piura TV</display-name></channel>
  <channel id="IquitosTV"><display-name>Iquitos TV</display-name></channel>
  <channel id="PunoTV"><display-name>Puno TV</display-name></channel>
  <channel id="TacnaTV"><display-name>Tacna TV</display-name></channel>
</tv>
EOF

      - name: Comprimir EPG
        run: gzip -9 -c epg_latam.xml > epg_latam.xml.gz
      
      - name: Subir cambios
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add epg_latam.xml epg_latam.xml.gz
          git commit -m "EPG actualizado $(date +'%Y-%m-%d')" || exit 0
          git push
